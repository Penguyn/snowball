<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowball — admin</title>
<link rel="stylesheet" href="https://use.typekit.net/xxj7zrj.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'snaga-unicase-display', sans-serif;
  --border: rgba(0,0,0,0.1);
  --grey: #f5f5f5;
  --red: #ff0000;
  --ease: cubic-bezier(0.4,0,0.2,1);
}

body {
  font-family: var(--font);
  font-weight: 100;
  background: #fff;
  color: #000;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-box {
  width: 340px;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.login-logo {
  height: 36px;
  width: auto;
  margin-bottom: 48px;
}

.login-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #aaa;
  margin-bottom: 24px;
}

.login-field {
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  padding: 12px 0;
  font-family: var(--font);
  font-weight: 100;
  font-size: 14px;
  color: #000;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
.login-field:focus { border-color: #000; }
.login-field::placeholder { color: #ccc; }

.login-btn {
  margin-top: 32px;
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #000;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: gap 0.3s var(--ease);
}
.login-btn:hover { gap: 18px; }

.arrow {
  display: block;
  width: 28px; height: 1px;
  background: #000;
  position: relative;
  transition: width 0.3s var(--ease);
}
.login-btn:hover .arrow { width: 40px; }
.arrow::after {
  content: '';
  position: absolute;
  right: 0; top: -3px;
  width: 6px; height: 6px;
  border-right: 1px solid #000;
  border-top: 1px solid #000;
  transform: rotate(45deg);
}

.login-error {
  margin-top: 16px;
  font-size: 11px;
  color: var(--red);
  letter-spacing: 0.06em;
  min-height: 16px;
}

/* ── ADMIN PANEL ── */
#adminPanel { display: none; }

.admin-nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 64px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 48px;
  background: rgba(255,255,255,0.96);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--border);
  z-index: 100;
}

.admin-logo { height: 32px; width: auto; }

.admin-nav-right {
  display: flex;
  align-items: center;
  gap: 32px;
}

.nav-btn {
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: #000;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  transition: opacity 0.2s;
}
.nav-btn:hover { opacity: 0.5; }
.nav-btn.red { color: var(--red); }

.admin-body {
  padding: 96px 48px 80px;
  max-width: 960px;
}

/* ── UPLOAD FORM ── */
.section-title {
  font-size: 11px;
  letter-spacing: 0.14em;
  color: #aaa;
  margin-bottom: 24px;
}

.upload-form {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0 48px;
  margin-bottom: 72px;
}

.upload-dropzone {
  grid-column: 1 / -1;
  border: 1px dashed var(--border);
  aspect-ratio: 16/9;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  margin-bottom: 24px;
  position: relative;
  transition: border-color 0.2s;
  background: var(--grey);
  overflow: hidden;
}
.upload-dropzone:hover { border-color: #000; }
.upload-dropzone.has-image { border-style: solid; }

.upload-dropzone img {
  position: absolute;
  inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
}

.drop-label {
  font-size: 11px;
  letter-spacing: 0.1em;
  color: #aaa;
  position: relative;
  z-index: 1;
  background: rgba(255,255,255,0.85);
  padding: 6px 12px;
}

.upload-dropzone input[type="file"] {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
  width: 100%;
  height: 100%;
}

.form-field {
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  padding: 14px 0;
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  color: #000;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
  margin-bottom: 4px;
}
.form-field:focus { border-color: #000; }
.form-field::placeholder { color: #ccc; }

textarea.form-field {
  resize: none;
  height: 72px;
  grid-column: 1 / -1;
}

.submit-btn {
  margin-top: 28px;
  grid-column: 1 / -1;
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.12em;
  color: #000;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: gap 0.3s var(--ease);
}
.submit-btn:hover { gap: 18px; }
.submit-btn .arrow { background: #000; }
.submit-btn .arrow::after { border-color: #000; }

.form-status {
  grid-column: 1 / -1;
  font-size: 11px;
  letter-spacing: 0.08em;
  min-height: 20px;
  margin-top: 8px;
}
.form-status.ok  { color: #000; }
.form-status.err { color: var(--red); }

/* ── PROJECT LIST ── */
.project-list { display: flex; flex-direction: column; gap: 2px; }

.project-row {
  display: grid;
  grid-template-columns: 80px 1fr 1fr auto;
  align-items: center;
  gap: 24px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}

.project-thumb {
  width: 80px;
  aspect-ratio: 1/1;
  object-fit: cover;
  background: var(--grey);
  display: block;
}

.project-info { display: flex; flex-direction: column; gap: 4px; }
.project-title { font-size: 13px; font-weight: 100; letter-spacing: 0.02em; }
.project-tag   { font-size: 10px; letter-spacing: 0.1em; color: #aaa; }

.project-actions { display: flex; gap: 16px; }

.action-btn {
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.08em;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: #aaa;
  transition: color 0.2s;
}
.action-btn:hover { color: #000; }
.action-btn.del:hover { color: var(--red); }

.move-btns { display: flex; flex-direction: column; gap: 4px; }
.move-btn {
  font-size: 10px;
  background: none;
  border: none;
  cursor: pointer;
  color: #ccc;
  line-height: 1;
  padding: 2px;
  transition: color 0.2s;
}
.move-btn:hover { color: #000; }

.empty-state {
  font-size: 12px;
  color: #ccc;
  letter-spacing: 0.06em;
  padding: 32px 0;
}

@media (max-width: 600px) {
  .admin-nav { padding: 0 24px; }
  .admin-body { padding: 88px 24px 60px; }
  .upload-form { grid-template-columns: 1fr; gap: 0; }
  .project-row { grid-template-columns: 60px 1fr auto; }
  .project-info + * { display: none; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <img src="Snowball_logo.svg" alt="Snowball" class="login-logo">
    <p class="login-label">admin access</p>
    <input class="login-field" type="email" id="loginEmail" placeholder="email" autocomplete="email">
    <input class="login-field" type="password" id="loginPassword" placeholder="password" autocomplete="current-password" style="margin-top:4px;">
    <button class="login-btn" onclick="doLogin()">
      sign in <span class="arrow"></span>
    </button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">

  <nav class="admin-nav">
    <img src="Snowball_logo.svg" alt="Snowball" class="admin-logo">
    <div class="admin-nav-right">
      <a href="/" class="nav-btn">← site</a>
      <button class="nav-btn red" onclick="doLogout()">sign out</button>
    </div>
  </nav>

  <div class="admin-body">

    <!-- UPLOAD FORM -->
    <p class="section-title">add project</p>
    <div class="upload-form">

      <div class="upload-dropzone" id="dropzone">
        <input type="file" id="imageFile" accept="image/*,video/*" onchange="previewImage(this)">
        <span class="drop-label" id="dropLabel">click to upload image</span>
      </div>

      <input class="form-field" type="text" id="projTitle" placeholder="project title">
      <input class="form-field" type="text" id="projTag" placeholder="tag  (e.g. motion graphics)">
      <textarea class="form-field" id="projDesc" placeholder="description"></textarea>

      <button class="submit-btn" onclick="uploadProject()">
        publish <span class="arrow"></span>
      </button>
      <p class="form-status" id="formStatus"></p>

    </div>

    <!-- PROJECT LIST -->
    <p class="section-title">projects</p>
    <div class="project-list" id="projectList">
      <p class="empty-state">loading...</p>
    </div>

  </div>
</div>

<script>
// ── SUPABASE CONFIG — paste your values here ──
const SUPABASE_URL = 'https://wevumnkqudiqfshzgtmb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldnVtbmtxdWRpcWZzaHpndG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjA3NDIsImV4cCI6MjA5MzM5Njc0Mn0.Z6NDn8Qi1bzCLoog1laFAWScHhp1rHX9Ook9_mmcvTE';

const h = (extra = {}) => ({
  'Content-Type': 'application/json',
  apikey: SUPABASE_KEY,
  Authorization: `Bearer ${token()}`,
  ...extra
});

function token() {
  return sessionStorage.getItem('sb_token') || SUPABASE_KEY;
}

// ── AUTH ──
async function doLogin() {
  const email    = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errEl    = document.getElementById('loginError');
  errEl.textContent = '';

  const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', apikey: SUPABASE_KEY },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();

  if (data.access_token) {
    sessionStorage.setItem('sb_token', data.access_token);
    showPanel();
  } else {
    errEl.textContent = 'incorrect email or password';
  }
}

async function doLogout() {
  await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
    method: 'POST', headers: h()
  });
  sessionStorage.removeItem('sb_token');
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showPanel() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display  = 'block';
  loadList();
}

// Auto-login if token exists
window.addEventListener('DOMContentLoaded', () => {
  if (sessionStorage.getItem('sb_token')) showPanel();
});

// Enter key on login
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    doLogin();
  }
});

// ── IMAGE PREVIEW ──
function previewImage(input) {
  const file = input.files[0];
  if (!file) return;
  const dz = document.getElementById('dropzone');
  const existing = dz.querySelector('img.preview');
  if (existing) existing.remove();
  const img = document.createElement('img');
  img.className = 'preview';
  img.src = URL.createObjectURL(file);
  dz.appendChild(img);
  dz.classList.add('has-image');
  document.getElementById('dropLabel').textContent = file.name;
}

// ── UPLOAD PROJECT ──
async function uploadProject() {
  const title  = document.getElementById('projTitle').value.trim();
  const tag    = document.getElementById('projTag').value.trim();
  const desc   = document.getElementById('projDesc').value.trim();
  const file   = document.getElementById('imageFile').files[0];
  const status = document.getElementById('formStatus');

  if (!title || !file) {
    status.textContent = 'title and image are required';
    status.className = 'form-status err';
    return;
  }

  status.textContent = 'uploading...';
  status.className = 'form-status ok';

  // 1. Upload image to Supabase Storage
  const ext      = file.name.split('.').pop();
  const filename = `${Date.now()}.${ext}`;

  const uploadRes = await fetch(
    `${SUPABASE_URL}/storage/v1/object/projects/${filename}`,
    { method: 'POST', headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${token()}`, 'Content-Type': file.type }, body: file }
  );

  if (!uploadRes.ok) {
    status.textContent = 'image upload failed — check storage bucket';
    status.className = 'form-status err';
    return;
  }

  const image_url = `${SUPABASE_URL}/storage/v1/object/public/projects/${filename}`;

  // 2. Get current max sort_order
  const listRes  = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=sort_order&order=sort_order.desc&limit=1`, { headers: h() });
  const listData = await listRes.json();
  const sort_order = listData.length ? (listData[0].sort_order + 1) : 0;

  // 3. Insert row
  const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/projects`, {
    method: 'POST',
    headers: h({ Prefer: 'return=minimal' }),
    body: JSON.stringify({ title, tag, description: desc, image_url, sort_order })
  });

  if (insertRes.ok || insertRes.status === 201) {
    status.textContent = 'published ✓';
    status.className = 'form-status ok';
    // Reset form
    document.getElementById('projTitle').value   = '';
    document.getElementById('projTag').value     = '';
    document.getElementById('projDesc').value    = '';
    document.getElementById('imageFile').value   = '';
    document.getElementById('dropLabel').textContent = 'click to upload image';
    const dz = document.getElementById('dropzone');
    const prev = dz.querySelector('img.preview');
    if (prev) prev.remove();
    dz.classList.remove('has-image');
    loadList();
  } else {
    status.textContent = 'something went wrong — try again';
    status.className = 'form-status err';
  }
}

// ── LOAD PROJECT LIST ──
async function loadList() {
  const res  = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*&order=sort_order.asc`, { headers: h() });
  const data = await res.json();
  const el   = document.getElementById('projectList');

  if (!data.length) {
    el.innerHTML = '<p class="empty-state">no projects yet</p>';
    return;
  }

  el.innerHTML = data.map((p, i) => `
    <div class="project-row" id="row-${p.id}">
      <img class="project-thumb" src="${p.image_url}" alt="${p.title}">
      <div class="project-info">
        <span class="project-title">${p.title}</span>
        <span class="project-tag">${p.tag || ''}</span>
      </div>
      <div class="move-btns">
        ${i > 0              ? `<button class="move-btn" onclick="moveProject('${p.id}', 'up')" title="move up">↑</button>` : '<span style="height:18px;display:block;"></span>'}
        ${i < data.length-1 ? `<button class="move-btn" onclick="moveProject('${p.id}', 'down')" title="move down">↓</button>` : ''}
      </div>
      <div class="project-actions">
        <button class="action-btn del" onclick="deleteProject('${p.id}', '${p.image_url}')">delete</button>
      </div>
    </div>
  `).join('');
}

// ── DELETE ──
async function deleteProject(id, imageUrl) {
  if (!confirm('delete this project?')) return;

  // Delete from DB
  await fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${id}`, {
    method: 'DELETE', headers: h()
  });

  // Delete image from storage
  const filename = imageUrl.split('/projects/').pop();
  await fetch(`${SUPABASE_URL}/storage/v1/object/projects/${filename}`, {
    method: 'DELETE', headers: h()
  });

  loadList();
}

// ── REORDER ──
async function moveProject(id, direction) {
  const res  = await fetch(`${SUPABASE_URL}/rest/v1/projects?select=*&order=sort_order.asc`, { headers: h() });
  const data = await res.json();
  const idx  = data.findIndex(p => p.id === id);
  const swapIdx = direction === 'up' ? idx - 1 : idx + 1;
  if (swapIdx < 0 || swapIdx >= data.length) return;

  const a = data[idx];
  const b = data[swapIdx];

  await Promise.all([
    fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${a.id}`, {
      method: 'PATCH', headers: h({ Prefer: 'return=minimal' }),
      body: JSON.stringify({ sort_order: b.sort_order })
    }),
    fetch(`${SUPABASE_URL}/rest/v1/projects?id=eq.${b.id}`, {
      method: 'PATCH', headers: h({ Prefer: 'return=minimal' }),
      body: JSON.stringify({ sort_order: a.sort_order })
    })
  ]);

  loadList();
}
</script>
</body>
</html>
