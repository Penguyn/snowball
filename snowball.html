<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowball — your communication</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet">
<style>
/* === SWAP FONT HERE when Adobe kit is ready ===
   Replace the Google Fonts link above with:
   <link rel="stylesheet" href="https://use.typekit.net/XXXXXXX.css">
   Then change --font to: 'Snaga Uni Display', sans-serif
*/

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'Outfit', sans-serif;
  --white: #ffffff;
  --ink: #111111;
  --grey-light: #b3b3b3;
  --grey-bg: #e8e8e8;
  --red: #ff0000;
  --border: rgba(0,0,0,0.09);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --nav-h: 72px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  background: var(--white);
  color: var(--ink);
  font-weight: 200;
  overflow-x: hidden;
}

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: var(--nav-h);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 48px;
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
}

.logo-link { display: flex; align-items: center; text-decoration: none; }
.logo-img { height: 28px; width: auto; display: block; }

.nav-contact {
  font-family: var(--font);
  font-weight: 200;
  font-size: 14px;
  letter-spacing: 0.02em;
  color: var(--red);
  cursor: pointer;
  background: none;
  border: none;
  padding: 0;
  transition: opacity 0.2s;
}

.nav-contact:hover { opacity: 0.65; }

/* ── PAGE BODY ── */
main {
  padding-top: var(--nav-h);
}

/* ── SECTION LABELS ── */
.section-label {
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey-light);
  padding: 40px 48px 0;
}

/* ── PROJECTS GRID ── */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 3px;
  padding: 0 48px;
}

.project-item {
  position: relative;
  overflow: hidden;
  cursor: pointer;
  background: var(--grey-bg);
  aspect-ratio: 1 / 1;
}

.project-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: filter 0.4s var(--ease);
}

.project-item:hover img {
  filter: brightness(0.82);
}

.project-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 20px;
  pointer-events: none;
}

.project-label {
  font-size: 12px;
  font-weight: 200;
  letter-spacing: 0.08em;
  color: #fff;
  opacity: 0;
  transform: translateY(4px);
  transition: opacity 0.3s var(--ease), transform 0.3s var(--ease);
}

.project-item:hover .project-label {
  opacity: 1;
  transform: translateY(0);
}

/* placeholder grey box */
.project-item.empty {
  cursor: default;
}
.project-item.empty:hover img { transform: none; }
.project-item.empty .project-overlay { display: none; }

/* ── CLIENTS SECTION ── */
.clients-label {
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey-light);
  padding: 56px 48px 0;
}

.clients-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 3px;
  padding: 0 48px;
}

.client-item {
  background: transparent;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
}

.client-item:hover { }

.client-item img {
  max-width: 60%;
  max-height: 50%;
  object-fit: contain;
  opacity: 0.55;
  transition: opacity 0.25s;
  filter: grayscale(1);
}

.client-item:hover img { opacity: 0.85; }

/* placeholder text for demo */
.client-placeholder {
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--grey-light);
  font-weight: 200;
}

/* ── FOOTER ── */
footer {
  margin-top: 56px;
  padding: 32px 48px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: 16px;
}

.footer-logo {
  font-weight: 100;
  font-size: 14px;
  letter-spacing: 0.04em;
  color: var(--ink);
}

.footer-logo span { color: var(--grey-light); }

.footer-meta {
  display: flex;
  gap: 32px;
  align-items: center;
  flex-wrap: wrap;
}

.footer-meta a, .footer-meta span {
  font-size: 11px;
  font-weight: 200;
  letter-spacing: 0.08em;
  color: var(--grey-light);
  text-decoration: none;
  transition: color 0.2s;
}

.footer-meta a:hover { color: var(--ink); }

/* ── OVERLAY ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s var(--ease);
}

.overlay.open {
  opacity: 1;
  pointer-events: all;
}

.overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(18px);
  cursor: pointer;
}

/* ── PROJECT OVERLAY ── */
.project-detail {
  position: relative;
  z-index: 1;
  width: min(900px, 92vw);
  max-height: 90vh;
  overflow-y: auto;
  background: var(--white);
  border: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr;
  transform: translateY(18px);
  transition: transform 0.4s var(--ease);
}

.overlay.open .project-detail {
  transform: translateY(0);
}

.detail-media {
  background: var(--grey-bg);
  aspect-ratio: 4/3;
  overflow: hidden;
}

.detail-media img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
}

.detail-info {
  padding: 40px 36px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.detail-tag {
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--grey-light);
  font-weight: 200;
}

.detail-title {
  font-size: 28px;
  font-weight: 100;
  letter-spacing: -0.01em;
  line-height: 1.15;
}

.detail-desc {
  font-size: 13px;
  font-weight: 200;
  color: #555;
  line-height: 1.75;
  flex: 1;
}

.detail-close {
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 200;
  color: var(--grey-light);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  font-family: var(--font);
  transition: color 0.2s;
  align-self: flex-start;
}

.detail-close:hover { color: var(--ink); }

/* ── CONTACT OVERLAY ── */
.contact-box {
  position: relative;
  z-index: 1;
  width: min(520px, 92vw);
  background: var(--white);
  border: 1px solid var(--border);
  padding: 52px 48px;
  transform: translateY(18px);
  transition: transform 0.4s var(--ease);
}

.overlay.open .contact-box {
  transform: translateY(0);
}

.contact-heading {
  font-size: 28px;
  font-weight: 100;
  letter-spacing: -0.01em;
  margin-bottom: 36px;
}

.contact-direct {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 36px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}

.contact-direct a {
  font-size: 13px;
  font-weight: 200;
  color: var(--ink);
  text-decoration: none;
  letter-spacing: 0.02em;
  transition: color 0.2s;
}

.contact-direct a:hover { color: var(--red); }

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.form-field {
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  padding: 14px 0;
  font-family: var(--font);
  font-size: 13px;
  font-weight: 200;
  color: var(--ink);
  outline: none;
  width: 100%;
  transition: border-color 0.25s;
}

.form-field::placeholder { color: var(--grey-light); }
.form-field:focus { border-color: var(--ink); }

textarea.form-field {
  resize: none;
  height: 80px;
  margin-top: 8px;
}

.form-submit {
  margin-top: 28px;
  font-family: var(--font);
  font-size: 11px;
  font-weight: 200;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink);
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: gap 0.3s var(--ease);
}

.form-submit:hover { gap: 18px; }

.arrow-line {
  display: block;
  width: 28px;
  height: 1px;
  background: var(--ink);
  position: relative;
  transition: width 0.3s var(--ease);
}

.form-submit:hover .arrow-line { width: 40px; }

.arrow-line::after {
  content: '';
  position: absolute;
  right: 0; top: -3px;
  width: 6px; height: 6px;
  border-right: 1px solid var(--ink);
  border-top: 1px solid var(--ink);
  transform: rotate(45deg);
}

.contact-close {
  position: absolute;
  top: 20px; right: 24px;
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  font-weight: 200;
  color: var(--grey-light);
  background: none;
  border: none;
  cursor: pointer;
  font-family: var(--font);
  transition: color 0.2s;
}

.contact-close:hover { color: var(--ink); }

/* ── RESPONSIVE ── */
@media (max-width: 1024px) {
  .projects-grid { grid-template-columns: repeat(3, 1fr); }
  .clients-grid { grid-template-columns: repeat(5, 1fr); }
}

@media (max-width: 768px) {
  nav { padding: 0 24px; }
  .section-label, .clients-label { padding-left: 24px; padding-right: 24px; }
  .projects-grid { grid-template-columns: repeat(2, 1fr); padding: 0 24px; gap: 2px; }
  .clients-grid { grid-template-columns: repeat(3, 1fr); padding: 0 24px; }
  .project-detail { grid-template-columns: 1fr; }
  .detail-media { aspect-ratio: 16/9; }
  footer { padding: 24px; flex-direction: column; align-items: flex-start; gap: 12px; }
  .footer-meta { gap: 20px; }
  .contact-box { padding: 40px 28px; }
}

@media (max-width: 480px) {
  .projects-grid { grid-template-columns: 1fr; }
  .clients-grid { grid-template-columns: repeat(2, 1fr); }
  .logo { font-size: 18px; }
}
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="logo-link" href="#" onclick="return false;">
    <img src="logo.svg" alt="Snowball — your communication" class="logo-img">
  </a>
  <button class="nav-contact" onclick="openContact()">contact</button>
</nav>

<main>
  <!-- PROJECTS -->
  <p class="section-label">Projects</p>
  <div class="projects-grid" id="projectsGrid">

    <div class="project-item" onclick="openProject(0)">
      <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=600&q=80&auto=format" alt="Project 1">
      <div class="project-overlay"><span class="project-label">Culture Film — TBC</span></div>
    </div>

    <div class="project-item" onclick="openProject(1)">
      <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=600&q=80&auto=format" alt="Project 2">
      <div class="project-overlay"><span class="project-label">All-Hands — TBC</span></div>
    </div>

    <div class="project-item" onclick="openProject(2)">
      <img src="https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=600&q=80&auto=format" alt="Project 3">
      <div class="project-overlay"><span class="project-label">Onboarding Series — TBC</span></div>
    </div>

    <div class="project-item" onclick="openProject(3)">
      <img src="https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=600&q=80&auto=format" alt="Project 4">
      <div class="project-overlay"><span class="project-label">Values Motion — TBC</span></div>
    </div>

    <div class="project-item" onclick="openProject(4)">
      <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?w=600&q=80&auto=format" alt="Project 5">
      <div class="project-overlay"><span class="project-label">Leadership Portraits — TBC</span></div>
    </div>

  </div>

  <!-- CLIENTS -->
  <p class="clients-label">Clients</p>
  <div class="clients-grid">
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
    <div class="client-item"><span class="client-placeholder">Client</span></div>
  </div>
</main>

<!-- FOOTER -->
<footer>
  <div class="footer-logo"><img src="logo.svg" alt="Snowball" style="height:20px;width:auto;opacity:0.5;"></div>
  <div class="footer-meta">
    <a href="mailto:hello@snowball.studio">hello@snowball.studio</a>
    <span>Tbilisi, Georgia</span>
    <span>© 2026 Snowball</span>
  </div>
</footer>

<!-- PROJECT OVERLAY -->
<div class="overlay" id="projectOverlay" onclick="handleOverlayClick(event, 'projectOverlay')">
  <div class="overlay-backdrop"></div>
  <div class="project-detail">
    <div class="detail-media">
      <img id="detailImg" src="" alt="">
    </div>
    <div class="detail-info">
      <span class="detail-tag" id="detailTag"></span>
      <h2 class="detail-title" id="detailTitle"></h2>
      <p class="detail-desc" id="detailDesc"></p>
      <button class="detail-close" onclick="closeOverlay('projectOverlay')">Close</button>
    </div>
  </div>
</div>

<!-- CONTACT OVERLAY -->
<div class="overlay" id="contactOverlay" onclick="handleOverlayClick(event, 'contactOverlay')">
  <div class="overlay-backdrop"></div>
  <div class="contact-box">
    <button class="contact-close" onclick="closeOverlay('contactOverlay')">Close</button>
    <h2 class="contact-heading">Let's talk.</h2>
    <div class="contact-direct">
      <a href="mailto:hello@snowball.studio">hello@snowball.studio</a>
      <a href="tel:+995000000000">+995 000 000 000</a>
    </div>
    <div class="contact-form">
      <input class="form-field" type="text" placeholder="Name">
      <input class="form-field" type="text" placeholder="Company">
      <input class="form-field" type="email" placeholder="Email">
      <textarea class="form-field" placeholder="Message"></textarea>
      <button class="form-submit">
        Send <span class="arrow-line"></span>
      </button>
    </div>
  </div>
</div>

<script>
const projects = [
  {
    tag: 'Motion graphics',
    title: 'Culture Film',
    desc: 'A 90-second animated film distilling a company's culture code into a visual story the whole team could share and feel proud of. Replace this with your actual project description.',
    img: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=900&q=80&auto=format'
  },
  {
    tag: 'Live action',
    title: 'All-Hands Film',
    desc: 'A produced shoot capturing real moments from a company-wide gathering — edited to feel like a memory, not a corporate recap.',
    img: 'https://images.unsplash.com/photo-1521737604893-d14cc237f11d?w=900&q=80&auto=format'
  },
  {
    tag: 'Live action',
    title: 'Onboarding Series',
    desc: 'Three-part content series for new joiners. Replaced a 40-page PDF with a watch-in-20-minutes experience.',
    img: 'https://images.unsplash.com/photo-1522202176988-66273c2fd55f?w=900&q=80&auto=format'
  },
  {
    tag: 'Motion graphics',
    title: 'Values Motion',
    desc: 'Six values, six vignettes. Each one uses a different visual metaphor to make abstract principles feel lived-in and human.',
    img: 'https://images.unsplash.com/photo-1559136555-9303baea8ebd?w=900&q=80&auto=format'
  },
  {
    tag: 'Live action',
    title: 'Leadership Portraits',
    desc: 'A cinematic portrait series for a newly restructured leadership team. Humanised faces behind roles people had only seen in org charts.',
    img: 'https://images.unsplash.com/photo-1497366216548-37526070297c?w=900&q=80&auto=format'
  }
];

function openProject(i) {
  const p = projects[i];
  document.getElementById('detailImg').src = p.img;
  document.getElementById('detailTag').textContent = p.tag;
  document.getElementById('detailTitle').textContent = p.title;
  document.getElementById('detailDesc').textContent = p.desc;
  document.getElementById('projectOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function openContact() {
  document.getElementById('contactOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}

function handleOverlayClick(e, id) {
  if (e.target.classList.contains('overlay-backdrop')) closeOverlay(id);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    closeOverlay('projectOverlay');
    closeOverlay('contactOverlay');
  }
});
</script>
</body>
</html>
