<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snowball — your communication</title>
<link rel="stylesheet" href="https://use.typekit.net/xxj7zrj.css">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --font: 'snaga-unicase-display', sans-serif;
  --white: #ffffff;
  --ink: #000000;
  --grey-light: #b3b3b3;
  --grey-bg: #e8e8e8;
  --red: #ff0000;
  --border: rgba(0,0,0,0.09);
  --ease: cubic-bezier(0.4, 0, 0.2, 1);
  --nav-h: 72px;
  --pad: 48px;
}

html { scroll-behavior: smooth; }

body {
  font-family: var(--font);
  font-weight: 100;
  background: var(--white);
  color: var(--ink);
  overflow-x: hidden;
  cursor: none;
}

a, button, input, textarea, img, * { cursor: none !important; }

/* ── CUSTOM CURSOR ── */
.cursor {
  position: fixed;
  top: 0; left: 0;
  width: 5px; height: 5px;
  background: #000;
  border-radius: 50%;
  pointer-events: none;
  z-index: 9999;
  transform: translate(-50%, -50%);
  transition: width 0.25s var(--ease), height 0.25s var(--ease),
              background 0.25s, border-color 0.25s;
  border: 1px solid transparent;
}
.cursor.hover {
  width: 30px; height: 30px;
  background: transparent;
  border-color: #000;
}
.cursor.hover-red {
  width: 30px; height: 30px;
  background: transparent;
  border-color: var(--red);
}
@media (hover: none) {
  body { cursor: auto; }
  .cursor { display: none; }
}

/* ── ENTRY ANIMATION ── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
.anim { opacity: 0; }
.anim.go { animation: fadeUp 0.75s var(--ease) forwards; }
.d1 { animation-delay: 0.05s; }
.d2 { animation-delay: 0.20s; }
.d3 { animation-delay: 0.35s; }
.d4 { animation-delay: 0.48s; }
.d5 { animation-delay: 0.60s; }

/* ── NAV ── */
nav {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 200;
  height: var(--nav-h);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 var(--pad);
  background: rgba(255,255,255,0.95);
  backdrop-filter: blur(10px);
}

.logo-link { display: flex; align-items: center; text-decoration: none; cursor: none; }
.logo-img  { height: 44px; width: auto; display: block; }

.nav-contact {
  font-family: var(--font);
  font-weight: 100;
  font-size: 14px;
  letter-spacing: 0.02em;
  color: var(--red);
  cursor: none;
  background: none;
  border: none;
  padding: 0;
  transition: opacity 0.2s;
}
.nav-contact:hover { opacity: 0.65; }

/* ── MAIN ── */
main { padding-top: var(--nav-h); }

/* ── SECTION HEADER ROW ── */
.section-header {
  display: flex;
  align-items: baseline;
  justify-content: flex-end;
  gap: 16px;
  padding: 64px 0 0;
  margin: 0 var(--pad);
}

.section-label {
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: #000;
}



/* ── PROJECTS SCROLL ── */
.projects-scroll {
  display: flex;
  overflow-x: auto;
  overflow-y: visible;
  gap: 3px;
  padding-left: var(--pad);
  padding-right: var(--pad);
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-sizing: content-box;
}
.projects-scroll::-webkit-scrollbar { display: none; }

.project-item {
  position: relative;
  overflow: hidden;
  cursor: none;
  background: #ffffff;
  flex: 0 0 calc(20vw - 12px);
  min-width: 220px;
  aspect-ratio: 1 / 1;
  scroll-snap-align: start;
}
.project-item img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: filter 0.4s var(--ease);
}
.project-item:hover img { filter: brightness(0.78); }

.project-overlay {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: flex-end;
  padding: 14px 16px;
  pointer-events: none;
  background: linear-gradient(transparent 55%, rgba(0,0,0,0.45) 100%);
}
.project-label {
  font-family: var(--font);
  font-weight: 100;
  font-size: 12px;
  letter-spacing: 0.04em;
  color: #fff;
}

/* ── CLIENTS ── */
.clients-scroll {
  display: flex;
  overflow-x: auto;
  overflow-y: hidden;
  gap: 3px;
  padding-left: var(--pad);
  padding-right: var(--pad);
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  box-sizing: content-box;
}
.clients-scroll::-webkit-scrollbar { display: none; }

.client-item {
  background: transparent;
  flex: 0 0 calc(11.11vw - 6px);
  min-width: 100px;
  aspect-ratio: 1 / 1;
  display: flex;
  align-items: center;
  justify-content: center;
  scroll-snap-align: start;
}
.client-item img {
  max-width: 75%;
  max-height: 65%;
  object-fit: contain;
  display: block;
}

/* ── FOOTER ── */
footer {
  margin-top: 80px;
  padding: 32px var(--pad);
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 20px;
}
.footer-meta {
  display: flex;
  gap: 32px;
  flex-wrap: wrap;
}
.footer-meta a, .footer-meta span {
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.04em;
  color: #000;
  text-decoration: none;
  transition: opacity 0.2s;
}
.footer-meta a:hover { opacity: 0.5; }

/* ── OVERLAY BASE ── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s var(--ease);
}
.overlay.open { opacity: 1; pointer-events: all; }

.overlay-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(18px);
  cursor: none;
}

/* ── PROJECT OVERLAY ── */
.project-detail {
  position: relative;
  z-index: 1;
  width: min(900px, 92vw);
  max-height: 90vh;
  overflow-y: auto;
  background: var(--white);
  display: grid;
  grid-template-columns: 1fr 1fr;
  transform: translateY(18px);
  transition: transform 0.4s var(--ease);
}
.overlay.open .project-detail { transform: translateY(0); }

.detail-media { background: var(--grey-bg); aspect-ratio: 4/3; overflow: hidden; }
.detail-media img { width: 100%; height: 100%; object-fit: cover; display: block; }

.detail-info {
  padding: 40px 36px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.detail-tag {
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: var(--grey-light);
}
.detail-title {
  font-family: var(--font);
  font-weight: 100;
  font-size: 26px;
  letter-spacing: -0.01em;
  line-height: 1.15;
  color: #000;
}
.detail-desc {
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  color: #000;
  line-height: 1.8;
  flex: 1;
}
.detail-close {
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: #000;
  background: none;
  border: none;
  cursor: none;
  padding: 0;
  transition: opacity 0.2s;
  align-self: flex-start;
}
.detail-close:hover { opacity: 0.5; }

/* ── CONTACT OVERLAY ── */
.contact-box {
  position: relative;
  z-index: 1;
  width: min(520px, 92vw);
  background: var(--white);
  border: 1px solid var(--border);
  padding: 52px 48px;
  transform: translateY(18px);
  transition: transform 0.4s var(--ease);
}
.overlay.open .contact-box { transform: translateY(0); }

.contact-heading {
  font-family: var(--font);
  font-weight: 100;
  font-size: 26px;
  letter-spacing: -0.01em;
  color: #000;
  margin-bottom: 36px;
}
.contact-direct {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-bottom: 36px;
  padding-bottom: 32px;
  border-bottom: 1px solid var(--border);
}
.contact-direct a {
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  letter-spacing: 0.02em;
  color: #000;
  text-decoration: none;
  transition: opacity 0.2s;
}
.contact-direct a:hover { opacity: 0.5; }

.contact-form { display: flex; flex-direction: column; gap: 0; }

.form-field {
  border: none;
  border-bottom: 1px solid var(--border);
  background: transparent;
  padding: 14px 0;
  font-family: var(--font);
  font-weight: 100;
  font-size: 13px;
  color: #000;
  outline: none;
  width: 100%;
  transition: border-color 0.25s;
}
.form-field::placeholder { color: var(--grey-light); }
.form-field:focus { border-color: #000; }
textarea.form-field { resize: none; height: 80px; margin-top: 8px; }

.form-submit {
  margin-top: 28px;
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: #000;
  background: none;
  border: none;
  cursor: none;
  padding: 0;
  display: flex;
  align-items: center;
  gap: 10px;
  transition: gap 0.3s var(--ease);
}
.form-submit:hover { gap: 18px; }

.arrow-line {
  display: block;
  width: 28px; height: 1px;
  background: #000;
  position: relative;
  transition: width 0.3s var(--ease);
}
.form-submit:hover .arrow-line { width: 40px; }
.arrow-line::after {
  content: '';
  position: absolute;
  right: 0; top: -3px;
  width: 6px; height: 6px;
  border-right: 1px solid #000;
  border-top: 1px solid #000;
  transform: rotate(45deg);
}

.contact-close {
  position: absolute;
  top: 20px; right: 24px;
  font-family: var(--font);
  font-weight: 100;
  font-size: 11px;
  letter-spacing: 0.08em;
  color: #000;
  background: none;
  border: none;
  cursor: none;
  transition: opacity 0.2s;
}
.contact-close:hover { opacity: 0.5; }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  :root { --pad: 24px; }
  .project-item  { flex: 0 0 72vw; }
  .client-item   { flex: 0 0 28vw; min-width: 80px; }
  .project-detail { grid-template-columns: 1fr; }
  .detail-media  { aspect-ratio: 16/9; }
  footer         { margin-top: 48px; }
  .contact-box   { padding: 40px 28px; }
}
@media (max-width: 480px) {
  .project-item { flex: 0 0 88vw; }
  .client-item  { flex: 0 0 36vw; min-width: 72px; }
  .logo-img     { height: 32px; }
}

</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<!-- NAV -->
<nav>
  <a class="logo-link anim d1" href="#" onclick="return false;">
    <img src="Snowball_logo.svg" alt="Snowball — your communication" class="logo-img">
  </a>
  <button class="nav-contact anim d2" onclick="openContact()">contact</button>
</nav>

<main>

  <!-- PROJECTS -->
  <div class="section-header anim d3">
    <span class="section-label">projects</span>
  </div>
  <div class="projects-scroll anim d4" id="projectsScroll">
    <!-- loaded from Supabase -->
  </div>

  <!-- CLIENTS -->
  <div class="section-header anim d4" style="padding-top: 56px;">
    <span class="section-label">clients</span>
  </div>
  <div class="clients-scroll anim d5">
    <div class="client-item"><img src="client1.svg" alt="Client"></div>
    <div class="client-item"><img src="client2.svg" alt="Client"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
    <div class="client-item"></div>
  </div>

</main>

<!-- FOOTER -->
<footer class="anim d5">
  <img src="Snowball_logo.svg" alt="Snowball" style="height:36px;width:auto;">
  <div class="footer-meta">
    <a href="mailto:hello@snowball.studio">hello@snowball.studio</a>
    <span>Tbilisi, Georgia</span>
    <span>© 2026 Snowball</span>
  </div>
</footer>

<!-- PROJECT OVERLAY -->
<div class="overlay" id="projectOverlay">
  <div class="overlay-backdrop" onclick="closeOverlay('projectOverlay')"></div>
  <div class="project-detail">
    <button class="detail-close" onclick="closeOverlay('projectOverlay')">close</button>
    <div class="detail-scroll" id="detailScroll">
      <div class="detail-cover"><img id="detailImg" src="" alt=""></div>
      <div class="detail-header">
        <span class="detail-tag" id="detailTag"></span>
        <h2 class="detail-title" id="detailTitle"></h2>
      </div>
      <div class="detail-blocks" id="detailBlocks"></div>
    </div>
  </div>
</div>

<!-- CONTACT OVERLAY -->
<div class="overlay" id="contactOverlay" onclick="handleOverlayClick(event,'contactOverlay')">
  <div class="overlay-backdrop"></div>
  <div class="contact-box">
    <button class="contact-close" onclick="closeOverlay('contactOverlay')">close</button>
    <h2 class="contact-heading">let's talk.</h2>
    <div class="contact-direct">
      <a href="mailto:hello@snowball.studio">hello@snowball.studio</a>
      <a href="tel:+995000000000">+995 000 000 000</a>
    </div>
    <div class="contact-form">
      <input class="form-field" type="text" placeholder="name">
      <input class="form-field" type="text" placeholder="company">
      <input class="form-field" type="email" placeholder="email">
      <textarea class="form-field" placeholder="message"></textarea>
      <button class="form-submit">send <span class="arrow-line"></span></button>
    </div>
  </div>
</div>

<script>
// ── SUPABASE CONFIG ── paste your values from Supabase dashboard ──
const SUPABASE_URL = 'https://wevumnkqudiqfshzgtmb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndldnVtbmtxdWRpcWZzaHpndG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4MjA3NDIsImV4cCI6MjA5MzM5Njc0Mn0.Z6NDn8Qi1bzCLoog1laFAWScHhp1rHX9Ook9_mmcvTE';

// ── CURSOR ──
const cursor = document.getElementById('cursor');
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top  = e.clientY + 'px';
});
function bindCursor() {
  document.querySelectorAll('a, button, .project-item').forEach(el => {
    el.addEventListener('mouseenter', () => {
      cursor.classList.remove('hover', 'hover-red');
      cursor.classList.add(el.classList.contains('nav-contact') ? 'hover-red' : 'hover');
    });
    el.addEventListener('mouseleave', () => cursor.classList.remove('hover', 'hover-red'));
  });
}

// ── ENTRY ANIMATION ──
window.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.anim').forEach(el => el.classList.add('go'));
  loadProjects();
});

// ── LOAD PROJECTS FROM SUPABASE ──
let projects = [];

async function loadProjects() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/projects?select=*&order=sort_order.asc`,
      { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
    );
    projects = await res.json();
  } catch (e) {
    projects = [];
  }

  const grid = document.getElementById('projectsScroll');
  grid.innerHTML = projects.map((p, i) => `
    <div class="project-item" onclick="openProject(${i})">
      <img src="${p.image_url}" alt="${p.title}">
      <div class="project-overlay"><span class="project-label">${p.title}</span></div>
    </div>
  `).join('');

  bindCursor();
}

// ── OVERLAYS ──
function getEmbedUrl(url) {
  try {
    const u = new URL(url);
    if (u.hostname.includes('youtube.com') || u.hostname.includes('youtu.be')) {
      const id = u.searchParams.get('v') || u.pathname.split('/').pop();
      return `https://www.youtube.com/embed/${id}`;
    }
    if (u.hostname.includes('vimeo.com')) {
      const id = u.pathname.split('/').pop();
      return `https://player.vimeo.com/video/${id}`;
    }
    return url;
  } catch { return url; }
}

function openProject(i) {
  const p = projects[i];
  document.getElementById('detailImg').src           = p.image_url;
  document.getElementById('detailTag').textContent   = p.tag || '';
  document.getElementById('detailTitle').textContent = p.title;

  const blocksEl = document.getElementById('detailBlocks');
  let parsed = [];
  try { parsed = JSON.parse(p.content || '[]'); } catch {}

  blocksEl.innerHTML = parsed.map(b => {
    if (b.type === 'text') return `<div class="block-text">${b.content}</div>`;
    if (b.type === 'image') return `<div class="block-img ${b.size||'medium'}"><img src="${b.url}" alt=""></div>`;
    if (b.type === 'embed') return `<div class="block-embed"><iframe src="${getEmbedUrl(b.url)}" allowfullscreen></iframe></div>`;
    return '';
  }).join('');

  document.getElementById('detailScroll').scrollTop = 0;
  document.getElementById('projectOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function openContact() {
  document.getElementById('contactOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeOverlay(id) {
  document.getElementById(id).classList.remove('open');
  document.body.style.overflow = '';
}
function handleOverlayClick(e, id) {
  if (e.target.classList.contains('overlay-backdrop')) closeOverlay(id);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeOverlay('projectOverlay'); closeOverlay('contactOverlay'); }
});
</script>
</body>
</html>
